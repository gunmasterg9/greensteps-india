steps:
  # Step 1: Build frontend Docker image
  - name: 'gcr.io/cloud-builders/docker'
    id: 'build-frontend'
    args:
      - 'build'
      - '--build-arg'
      - 'VITE_API_URL=${_API_URL}'
      - '-t'
      - 'asia-south1-docker.pkg.dev/$PROJECT_ID/greensteps/greensteps-web:latest'
      - '.'

  # Step 2: Push to Artifact Registry
  - name: 'gcr.io/cloud-builders/docker'
    id: 'push-frontend'
    args:
      - 'push'
      - 'asia-south1-docker.pkg.dev/$PROJECT_ID/greensteps/greensteps-web:latest'

  # Step 3: Deploy to Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    id: 'deploy-frontend'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'greensteps-web'
      - '--image=asia-south1-docker.pkg.dev/$PROJECT_ID/greensteps/greensteps-web:latest'
      - '--region=asia-south1'
      - '--platform=managed'
      - '--allow-unauthenticated'
      - '--port=80'
      - '--memory=256Mi'
      - '--max-instances=5'

substitutions:
  _API_URL: https://greensteps-api-placeholder.a.run.app/api/v1

images:
  - 'asia-south1-docker.pkg.dev/$PROJECT_ID/greensteps/greensteps-web:latest'

options:
  logging: CLOUD_LOGGING_ONLY
