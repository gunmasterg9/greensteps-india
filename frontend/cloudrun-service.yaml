apiVersion: serving.knative.dev/v1
kind: Service
metadata:
  name: greensteps-web
  annotations:
    run.googleapis.com/ingress: all
    run.googleapis.com/launch-stage: GA
spec:
  template:
    metadata:
      annotations:
        autoscaling.knative.dev/minScale: '0'
        autoscaling.knative.dev/maxScale: '5'
        run.googleapis.com/cpu-throttling: 'true'
    spec:
      containerConcurrency: 80
      timeoutSeconds: 300
      containers:
        - image: asia-south1-docker.pkg.dev/PROJECT_ID/greensteps/greensteps-web:latest
          ports:
            - containerPort: 80
          resources:
            limits:
              cpu: '1'
              memory: 256Mi
  traffic:
    - percent: 100
      latestRevision: true
