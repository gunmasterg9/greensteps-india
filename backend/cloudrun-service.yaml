apiVersion: serving.knative.dev/v1
kind: Service
metadata:
  name: greensteps-api
  annotations:
    run.googleapis.com/ingress: all
    run.googleapis.com/launch-stage: GA
spec:
  template:
    metadata:
      annotations:
        autoscaling.knative.dev/minScale: '0'
        autoscaling.knative.dev/maxScale: '10'
        run.googleapis.com/cpu-throttling: 'true'
    spec:
      containerConcurrency: 80
      timeoutSeconds: 300
      containers:
        - image: asia-south1-docker.pkg.dev/PROJECT_ID/greensteps/greensteps-api:latest
          ports:
            - containerPort: 5000
          resources:
            limits:
              cpu: '1'
              memory: 512Mi
          env:
            - name: NODE_ENV
              value: production
            - name: PORT
              value: '5000'
          # Secrets loaded from GCP Secret Manager
          envFrom: []
          volumeMounts: []
      volumes: []
  traffic:
    - percent: 100
      latestRevision: true
