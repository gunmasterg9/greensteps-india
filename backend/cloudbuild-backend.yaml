steps:
  # Step 1: Build backend Docker image
  - name: 'gcr.io/cloud-builders/docker'
    id: 'build-backend'
    args:
      - 'build'
      - '-t'
      - 'asia-south1-docker.pkg.dev/$PROJECT_ID/greensteps/greensteps-api:latest'
      - '.'

  # Step 2: Push to Artifact Registry
  - name: 'gcr.io/cloud-builders/docker'
    id: 'push-backend'
    args:
      - 'push'
      - 'asia-south1-docker.pkg.dev/$PROJECT_ID/greensteps/greensteps-api:latest'

  # Step 3: Deploy to Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    id: 'deploy-backend'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'greensteps-api'
      - '--image=asia-south1-docker.pkg.dev/$PROJECT_ID/greensteps/greensteps-api:latest'
      - '--region=asia-south1'
      - '--platform=managed'
      - '--allow-unauthenticated'
      - '--port=5000'
      - '--memory=512Mi'
      - '--cpu=1'
      - '--min-instances=0'
      - '--max-instances=10'
      - '--set-env-vars=NODE_ENV=production'

images:
  - 'asia-south1-docker.pkg.dev/$PROJECT_ID/greensteps/greensteps-api:latest'

options:
  logging: CLOUD_LOGGING_ONLY
