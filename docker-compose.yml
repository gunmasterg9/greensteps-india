version: '3.8'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "5000:5000"
    environment:
      - PORT=5000
      - NODE_ENV=production
      # Fill with Atlas Mongo URI to connect DB
      - MONGO_URI=
      # Fill with Firebase Admin secrets to connect auth
      - FIREBASE_PROJECT_ID=
      - FIREBASE_CLIENT_EMAIL=
      - FIREBASE_PRIVATE_KEY=
      - JWT_SECRET=supersecretgreenstepsindiadevelopmentkey
    networks:
      - greensteps-net

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:80"

    environment:
      - VITE_API_URL=http://localhost:5000/api/v1
      # Leave empty to run in offline mock-mode inside docker
      - VITE_FIREBASE_API_KEY=
      - VITE_FIREBASE_AUTH_DOMAIN=
      - VITE_FIREBASE_PROJECT_ID=
      - VITE_FIREBASE_STORAGE_BUCKET=
      - VITE_FIREBASE_MESSAGING_SENDER_ID=
      - VITE_FIREBASE_APP_ID=
      - VITE_MOCK_MODE=false
    depends_on:
      - backend
    networks:
      - greensteps-net

networks:
  greensteps-net:
    driver: bridge
